# Aggressive mode: can use low-utilization GPUs even if a foreign process exists.
# Use only if your group explicitly agrees that <10% utilization jobs may be co-scheduled.
idle_policy:
  gpu_utilization_below_pct: 10
  min_free_memory_mib: 8000
  require_no_foreign_compute_process: false
  allow_low_utilization_with_foreign_process: true
  exclude_gpus: []

job:
  name: vllm-synthetic-generation-aggressive
  gpus_per_job: 1
  max_jobs: 8
  cooldown_seconds_after_stop: 120
  stop_timeout_seconds: 45
  environment:
    VLLM_NO_USAGE_STATS: "1"
    TOKENIZERS_PARALLELISM: "false"
  command:
    - uv
    - run
    - --no-sync
    - gpu-slack-vllm-generate
    - --model
    - Qwen/Qwen2.5-1.5B-Instruct
    - --prompts
    - data/input/prompts.jsonl
    - --output-dir
    - "{output_dir}"
    - --batch-size
    - "16"
    - --max-tokens
    - "256"
    - --time-budget-min
    - "50"
    - --tensor-parallel-size
    - "{num_gpus}"
    - --gpu-memory-utilization
    - "0.80"

runtime:
  poll_interval_seconds: 300
  repo_root: "."
  state_dir: state
  log_dir: logs
  output_dir: data/output/generations
